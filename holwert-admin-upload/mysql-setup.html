<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySQL Database Setup - Holwert</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 4px;
        }
        .info-box h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .info-box p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        .credentials {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .credential-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .credential-item:last-child {
            border-bottom: none;
        }
        .credential-label {
            font-weight: 600;
            color: #333;
        }
        .credential-value {
            color: #666;
            font-family: monospace;
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .result.show {
            display: block;
        }
        .result h3 {
            margin-bottom: 10px;
        }
        .result ul {
            margin-left: 20px;
            margin-top: 10px;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 MySQL Database Setup</h1>
        <p class="subtitle">Richt automatisch de MySQL database in voor Holwert app</p>

        <div class="info-box">
            <h3>📋 Database Credentials</h3>
            <p>Deze credentials worden gebruikt om de database in te richten:</p>
        </div>

        <div class="credentials">
            <div class="credential-item">
                <span class="credential-label">Host:</span>
                <span class="credential-value">localhost:3306</span>
            </div>
            <div class="credential-item">
                <span class="credential-label">Database:</span>
                <span class="credential-value">appenvlo_holwert</span>
            </div>
            <div class="credential-item">
                <span class="credential-label">Gebruiker:</span>
                <span class="credential-value">db_holwert</span>
            </div>
        </div>

        <button id="setupBtn" onclick="setupDatabase()">
            Database Setup Uitvoeren
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Database setup wordt uitgevoerd...</p>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        async function setupDatabase() {
            const btn = document.getElementById('setupBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            btn.disabled = true;
            loading.classList.add('show');
            result.classList.remove('show', 'success', 'error');

            try {
                const response = await fetch('https://holwert-backend.vercel.app/api/setup-mysql-database', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        host: 'localhost',
                        port: 3306,
                        user: 'db_holwert',
                        password: '', // SECURITY: Set via environment variable DB_PASSWORD
                        database: 'appenvlo_holwert'
                    })
                });

                const data = await response.json();

                loading.classList.remove('show');

                if (data.success) {
                    result.className = 'result success show';
                    let html = '<h3>✅ Database Setup Voltooid!</h3>';
                    html += '<p>De volgende tabellen zijn aangemaakt:</p>';
                    if (data.results.created.length > 0) {
                        html += '<ul>';
                        data.results.created.forEach(table => {
                            html += `<li>✅ ${table}</li>`;
                        });
                        html += '</ul>';
                    }
                    if (data.results.skipped.length > 0) {
                        html += '<p>De volgende tabellen bestonden al:</p>';
                        html += '<ul>';
                        data.results.skipped.forEach(table => {
                            html += `<li>⏭️ ${table}</li>`;
                        });
                        html += '</ul>';
                    }
                    result.innerHTML = html;
                } else {
                    result.className = 'result error show';
                    result.innerHTML = `
                        <h3>❌ Setup Gefaald</h3>
                        <p><strong>Fout:</strong> ${data.message || data.error}</p>
                        ${data.code ? `<p><strong>Code:</strong> ${data.code}</p>` : ''}
                    `;
                }
            } catch (error) {
                loading.classList.remove('show');
                result.className = 'result error show';
                result.innerHTML = `
                    <h3>❌ Fout</h3>
                    <p>${error.message}</p>
                `;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
